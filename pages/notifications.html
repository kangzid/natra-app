<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NATRA - Pemberitahuan</title>
  <link rel="stylesheet" href="../src/styles/tailwind.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-slate-50 relative">

  <div class="app-wrap pb-32">

    <!-- Top Header - Clean Style -->
    <header class="module-header bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-[100]">
      <div class="module-header-row">
        <h1 class="module-title">Notifikasi</h1>
        <button id="mark-all-btn"
          class="text-sm font-semibold text-primary-600 flex items-center gap-1 bg-primary-50 px-3 py-1.5 rounded-full hover:bg-primary-100 transition-colors">
          <i data-lucide="check-check" class="w-4 h-4"></i> Tandai Dibaca
        </button>
      </div>
      <p class="text-xs font-semibold text-slate-400 mt-1" id="unread-count-text">Memuat status...</p>
    </header>

    <main class="px-5 py-2 relative z-10" id="main-content">
      <div id="notif-list" class="divide-y divide-gray-100/50">
        <!-- Notifications injected with .notif-card-ios -->
      </div>

      <div id="load-more-container" class="mt-6 flex justify-center pb-2 hidden">
        <button id="load-more-btn"
          class="px-5 py-2 bg-white border border-slate-200 text-slate-600 font-semibold text-sm rounded-full shadow-sm hover:bg-slate-50 transition-colors">
          Tampilkan Lebih Banyak
        </button>
      </div>
    </main>

    <!-- Bottom Navigation - Clean Floating Style -->
    <nav class="glass-nav-floating">
      <div class="flex justify-around items-center">
        <a href="dashboard.html" class="nav-item text-slate-400">
          <div class="nav-icon-wrap">
            <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
          </div>
          <span class="nav-label">Beranda</span>
        </a>
        <a href="attendance.html" class="nav-item text-slate-400">
          <div class="nav-icon-wrap">
            <i data-lucide="fingerprint" class="w-6 h-6"></i>
          </div>
          <span class="nav-label">Absensi</span>
        </a>
        <a href="tasks.html" class="nav-item text-slate-400">
          <div class="nav-icon-wrap">
            <i data-lucide="clipboard-list" class="w-6 h-6"></i>
          </div>
          <span class="nav-label">Tugas</span>
        </a>
        <a href="notifications.html" class="nav-item active">
          <div class="nav-icon-wrap">
            <div class="relative">
              <i data-lucide="bell" class="w-6 h-6"></i>
              <span id="notif-nav-badge"
                class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">0</span>
            </div>
          </div>
          <span class="nav-label">Notif</span>
        </a>
        <a href="profile.html" class="nav-item text-slate-400">
          <div class="nav-icon-wrap">
            <i data-lucide="user" class="w-6 h-6"></i>
          </div>
          <span class="nav-label">Profil</span>
        </a>
      </div>
    </nav>
  </div>

  <script type="module" src="../src/features/notification/notification.controller.js"></script>
  <script>lucide.createIcons();</script>
</body>

</html>
