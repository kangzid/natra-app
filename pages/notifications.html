<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NATRA - Pemberitahuan</title>
  <link rel="stylesheet" href="../src/styles/tailwind.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 relative pb-24">

  <div class="app-screen">
    
    <!-- Top Header -->
    <header class="module-header">
      <div class="module-header-row">
        <h1 class="module-title">Notifikasi</h1>
        <button id="mark-all-btn" class="text-sm font-semibold text-primary-600 flex items-center gap-1 bg-primary-50 px-3 py-1.5 rounded-full hover:bg-primary-100 transition-colors">
          <i data-lucide="check-check" class="w-4 h-4"></i> Tandai Dibaca
        </button>
      </div>
      <p class="text-xs font-semibold text-slate-400 mt-1" id="unread-count-text">Memuat status...</p>
    </header>

    <main class="flex-1 overflow-y-auto px-4 py-4 relative z-10" id="main-scroll">
      <div id="notif-list" class="space-y-3">
         <!-- Notifications injected here -->
      </div>
      
      <div id="load-more-container" class="mt-6 flex justify-center pb-2 hidden">
         <button id="load-more-btn" class="px-5 py-2 bg-white border border-slate-200 text-slate-600 font-semibold text-sm rounded-full shadow-sm hover:bg-slate-50 transition-colors">
           Tampilkan Lebih Banyak
         </button>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full max-w-md glass-nav z-50">
      <div class="flex justify-around items-center px-2 py-1">
        <a href="dashboard.html" class="nav-item">
          <i data-lucide="layout-dashboard" class="w-6 h-6 mb-1"></i>
          <span class="text-[10px] font-semibold">Beranda</span>
        </a>
        <a href="attendance.html" class="nav-item">
          <i data-lucide="fingerprint" class="w-6 h-6 mb-1"></i>
          <span class="text-[10px] font-semibold">Absensi</span>
        </a>
        <a href="tasks.html" class="nav-item">
          <i data-lucide="clipboard-list" class="w-6 h-6 mb-1"></i>
          <span class="text-[10px] font-semibold">Tugas</span>
        </a>
        <a href="notifications.html" class="nav-item active">
          <div class="relative">
            <i data-lucide="bell" class="w-6 h-6 mb-1"></i>
            <span id="notif-nav-badge" class="hidden absolute -top-1 -right-1 bg-danger text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white shadow-sm">0</span>
          </div>
          <span class="text-[10px] font-semibold">Notif</span>
        </a>
        <a href="profile.html" class="nav-item">
          <i data-lucide="user" class="w-6 h-6 mb-1"></i>
          <span class="text-[10px] font-semibold">Profil</span>
        </a>
      </div>
      <div class="h-5 w-full"></div>
    </nav>
  </div>

  <script type="module" src="../src/features/notification/notification.controller.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
