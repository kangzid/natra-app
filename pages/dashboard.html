<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NATRA - Dashboard</title>
  <link rel="stylesheet" href="../src/styles/tailwind.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 relative pb-24">
  
  <div class="app-screen">
    
    <!-- Top Header -->
    <header class="bg-primary-600 px-5 pt-8 pb-10 text-white rounded-b-[2rem] shadow-lg relative z-10">
      <div class="flex justify-between items-center mb-6">
        <div>
          <p class="text-primary-200 text-sm font-medium mb-1" id="greeting-text">Selamat Pagi</p>
          <h2 class="text-2xl font-bold tracking-tight" id="user-name">Memuat...</h2>
        </div>
        <div class="w-14 h-14 bg-white/20 backdrop-blur rounded-2xl flex items-center justify-center text-xl font-bold shadow-sm border border-white/10" id="user-avatar">
          --
        </div>
      </div>
      
      <div class="flex justify-between items-center bg-black/10 rounded-xl p-3 backdrop-blur-sm border border-white/10">
        <div class="flex items-center gap-3">
          <i data-lucide="badge-check" class="w-5 h-5 text-emerald-300"></i>
          <span class="font-medium text-sm">ID Pegawai</span>
        </div>
        <span class="font-bold tracking-widest text-primary-100" id="employee-id-text">------</span>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto px-5 -mt-4 relative z-20 pb-24" id="main-scroll">
      
      <!-- Refresh Area -->
      <div class="flex justify-end mb-2">
        <button id="refresh-btn" class="p-2 bg-white rounded-full shadow-sm text-slate-400 hover:text-primary-500 transition-colors">
          <i data-lucide="refresh-cw" class="w-4 h-4"></i>
        </button>
      </div>

      <div id="dashboard-loading" class="space-y-4">
        <!-- Skeleton -->
        <div class="bg-white rounded-2xl p-4 animate-pulse h-32 border border-slate-100"></div>
        <div class="bg-white rounded-2xl p-4 animate-pulse h-32 border border-slate-100"></div>
      </div>

      <div id="dashboard-content" class="hidden space-y-4 fade-in">
        
        <!-- Attendance Today Card -->
        <div class="card p-5">
          <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-slate-800 flex items-center gap-2">
              <i data-lucide="clock" class="w-5 h-5 text-primary-500"></i>
              Absensi Hari Ini
            </h3>
            <span id="att-status" class="px-2.5 py-1 text-xs font-semibold rounded-full bg-slate-100 text-slate-600">--</span>
          </div>
          <div class="flex gap-4">
            <div class="flex-1 bg-slate-50 rounded-xl p-4 border border-slate-100 relative overflow-hidden group">
              <div class="absolute -right-2 -bottom-2 opacity-5"><i data-lucide="log-in" class="w-16 h-16"></i></div>
              <p class="text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Check In</p>
              <p class="text-2xl font-bold text-slate-800" id="att-checkin">--:--</p>
            </div>
            <div class="flex-1 bg-slate-50 rounded-xl p-4 border border-slate-100 relative overflow-hidden group">
              <div class="absolute -right-2 -bottom-2 opacity-5"><i data-lucide="log-out" class="w-16 h-16"></i></div>
              <p class="text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Check Out</p>
              <p class="text-2xl font-bold text-slate-800" id="att-checkout">--:--</p>
            </div>
          </div>
        </div>

        <!-- Task Summary -->
        <div class="card p-5">
          <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-slate-800 flex items-center gap-2">
              <i data-lucide="layout-list" class="w-5 h-5 text-amber-500"></i>
              Tugas Aktif
            </h3>
            <a href="tasks.html" class="text-xs font-semibold text-primary-600 flex items-center">Lihat <i data-lucide="chevron-right" class="w-3 h-3 ml-0.5"></i></a>
          </div>
          <div class="grid grid-cols-3 gap-3">
            <div class="text-center p-3 rounded-xl bg-slate-50 border border-slate-100">
              <p class="text-xs text-slate-500 font-medium mb-1">Pending</p>
              <p class="text-xl font-bold text-slate-700" id="tasks-pending">0</p>
            </div>
            <div class="text-center p-3 rounded-xl bg-amber-50 border border-amber-100">
              <p class="text-xs text-amber-600 font-medium mb-1">Proses</p>
              <p class="text-xl font-bold text-amber-700" id="tasks-inprogress">0</p>
            </div>
            <div class="text-center p-3 rounded-xl bg-emerald-50 border border-emerald-100">
              <p class="text-xs text-emerald-600 font-medium mb-1">Selesai</p>
              <p class="text-xl font-bold text-emerald-700" id="tasks-completed">0</p>
            </div>
          </div>
        </div>

        <!-- GPS Toggle -->
        <div class="card p-4 flex justify-between items-center">
           <div class="flex items-center gap-3">
             <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center">
               <i data-lucide="navigation" class="w-5 h-5 text-blue-500"></i>
             </div>
             <div>
               <p class="font-bold text-slate-800 text-sm">GPS Tracking</p>
               <p class="text-xs text-slate-500" id="gps-status-text">Berhenti</p>
             </div>
           </div>
           <label class="relative inline-flex items-center cursor-pointer">
             <input type="checkbox" id="gps-toggle" class="sr-only peer">
             <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-500"></div>
           </label>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <!-- Monthly Attendance -->
          <div class="card p-4">
            <h3 class="font-bold text-slate-800 text-sm mb-3 flex items-center gap-2">
              <i data-lucide="calendar-days" class="w-4 h-4 text-emerald-500"></i> B. Ini
            </h3>
            <div class="space-y-2">
              <div class="flex justify-between items-center text-xs">
                <span class="text-slate-500 flex items-center gap-1.5"><div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div>Hadir</span>
                <span class="font-bold text-slate-700" id="monthly-present">0</span>
              </div>
              <div class="flex justify-between items-center text-xs">
                <span class="text-slate-500 flex items-center gap-1.5"><div class="w-1.5 h-1.5 rounded-full bg-amber-500"></div>Telat</span>
                <span class="font-bold text-slate-700" id="monthly-late">0</span>
              </div>
              <div class="flex justify-between items-center text-xs">
                <span class="text-slate-500 flex items-center gap-1.5"><div class="w-1.5 h-1.5 rounded-full bg-red-500"></div>Absen</span>
                <span class="font-bold text-slate-700" id="monthly-absent">0</span>
              </div>
            </div>
          </div>

          <!-- Notifications -->
          <div class="card p-4 flex flex-col justify-between">
            <h3 class="font-bold text-slate-800 text-sm mb-2 flex items-center gap-2">
              <i data-lucide="bell" class="w-4 h-4 text-primary-500"></i> Notifikasi
            </h3>
            <div class="flex-1 flex flex-col items-center justify-center py-2">
              <span class="text-3xl font-extrabold text-primary-600" id="notif-count">0</span>
              <span class="text-[10px] text-slate-400 font-medium uppercase mt-1">Belum Dibaca</span>
            </div>
            <a href="notifications.html" class="mt-2 text-xs font-semibold text-center text-primary-600 p-2 bg-primary-50 rounded-lg">Buka <i data-lucide="arrow-right" class="w-3 h-3 inline"></i></a>
          </div>
        </div>

      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full max-w-md glass-nav z-50">
      <div class="flex justify-around items-center px-2 py-1">
        <a href="dashboard.html" class="nav-item active">
          <i data-lucide="layout-dashboard" class="w-6 h-6 mb-1"></i>
          <span class="text-[10px] font-semibold">Beranda</span>
        </a>
        <a href="attendance.html" class="nav-item">
          <i data-lucide="fingerprint" class="w-6 h-6 mb-1"></i>
          <span class="text-[10px] font-semibold">Absensi</span>
        </a>
        <a href="tasks.html" class="nav-item">
          <i data-lucide="clipboard-list" class="w-6 h-6 mb-1"></i>
          <span class="text-[10px] font-semibold">Tugas</span>
        </a>
        <a href="notifications.html" class="nav-item">
          <div class="relative">
            <i data-lucide="bell" class="w-6 h-6 mb-1"></i>
            <span id="notif-nav-badge" class="hidden absolute -top-1 -right-1 bg-danger text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white shadow-sm">0</span>
          </div>
          <span class="text-[10px] font-semibold">Notif</span>
        </a>
        <a href="profile.html" class="nav-item">
          <i data-lucide="user" class="w-6 h-6 mb-1"></i>
          <span class="text-[10px] font-semibold">Profil</span>
        </a>
      </div>
      <!-- iOS style home indicator area -->
      <div class="h-5 w-full"></div>
    </nav>
  </div>

  <script type="module" src="../src/features/dashboard/dashboard.controller.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
