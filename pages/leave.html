<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NATRA - Pengajuan Cuti</title>
  <link rel="stylesheet" href="../src/styles/tailwind.css">
  <script src="../src/core/theme/theme-init.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 pb-12">
  <div class="app-wrap">
    
    <!-- Top Header - Matching Style -->
    <header class="module-header bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-gray-100 dark:border-slate-700 sticky top-0 z-[100]">
      <div class="module-header-row flex items-center gap-4 px-5 h-16">
        <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center text-slate-500 active:scale-90 transition-transform">
          <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
        <h1 class="text-lg font-bold text-slate-800 dark:text-white">Pengajuan Cuti</h1>
        <div class="ml-auto">
          <button class="w-10 h-10 rounded-full bg-primary-50 dark:bg-primary-900/30 flex items-center justify-center text-primary-600 dark:text-primary-400">
            <i data-lucide="plus" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
    </header>

    <main class="px-5 py-6 space-y-8">
      
      <!-- Leave Balance Summary -->
      <div class="grid grid-cols-2 gap-4">
        <div class="bg-white dark:bg-slate-800 p-5 rounded-[2rem] border border-slate-100 dark:border-slate-700 shadow-sm flex flex-col items-center">
          <div class="w-10 h-10 rounded-xl bg-blue-50 dark:bg-blue-900/20 flex items-center justify-center text-blue-500 mb-3">
            <i data-lucide="calendar" class="w-5 h-5"></i>
          </div>
          <p class="text-[24px] font-extrabold text-slate-900 dark:text-white">12</p>
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Sisa Cuti</p>
        </div>
        <div class="bg-white dark:bg-slate-800 p-5 rounded-[2rem] border border-slate-100 dark:border-slate-700 shadow-sm flex flex-col items-center">
          <div class="w-10 h-10 rounded-xl bg-emerald-50 dark:bg-emerald-900/20 flex items-center justify-center text-emerald-500 mb-3">
            <i data-lucide="check-circle" class="w-5 h-5"></i>
          </div>
          <p class="text-[24px] font-extrabold text-slate-900 dark:text-white">4</p>
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Terpakai</p>
        </div>
      </div>

      <!-- Quick Action: New Request -->
      <section class="space-y-4">
        <h3 class="px-5 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest">Buat Pengajuan</h3>
        <div class="bg-white dark:bg-slate-800 rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 dark:border-slate-700">
          <div class="p-6 space-y-4">
            <div class="space-y-2">
              <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Jenis Cuti</label>
              <div class="relative">
                <select class="w-full bg-slate-50 dark:bg-slate-700/50 border-none rounded-2xl px-4 py-3.5 text-sm font-bold text-slate-800 dark:text-white appearance-none focus:ring-2 focus:ring-primary-500/20">
                  <option>Cuti Tahunan</option>
                  <option>Cuti Besar</option>
                  <option>Cuti Melahirkan</option>
                  <option>Cuti Alasan Penting</option>
                </select>
                <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div class="space-y-2">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Mulai</label>
                <input type="date" class="w-full bg-slate-50 dark:bg-slate-700/50 border-none rounded-2xl px-4 py-3.5 text-sm font-bold text-slate-800 dark:text-white focus:ring-2 focus:ring-primary-500/20">
              </div>
              <div class="space-y-2">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Sampai</label>
                <input type="date" class="w-full bg-slate-50 dark:bg-slate-700/50 border-none rounded-2xl px-4 py-3.5 text-sm font-bold text-slate-800 dark:text-white focus:ring-2 focus:ring-primary-500/20">
              </div>
            </div>

            <button class="w-full bg-primary-600 hover:bg-primary-700 text-white rounded-2xl py-4 flex items-center justify-center gap-3 active:scale-95 transition-all shadow-lg shadow-primary-500/20 mt-2">
              <i data-lucide="send" class="w-5 h-5"></i>
              <span class="font-extrabold">Ajukan Cuti</span>
            </button>
          </div>
        </div>
      </section>

      <!-- History List: iOS Style -->
      <section class="space-y-4">
        <h3 class="px-5 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest">Riwayat Pengajuan</h3>
        <div class="bg-white dark:bg-slate-800 rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 dark:border-slate-700">
          <!-- History Item 1 -->
          <div class="flex items-center justify-between px-6 py-5 border-b border-slate-50 dark:border-slate-700/50">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full bg-blue-50 dark:bg-blue-900/20 flex items-center justify-center text-blue-600">
                <i data-lucide="sun" class="w-5 h-5"></i>
              </div>
              <div>
                <p class="text-[13px] font-extrabold text-slate-800 dark:text-slate-200">Libur Lebaran</p>
                <p class="text-[10px] text-slate-400 font-medium">10 - 15 April • 6 Hari</p>
              </div>
            </div>
            <span class="px-2.5 py-1 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 rounded-lg text-[9px] font-extrabold uppercase tracking-widest">Approved</span>
          </div>
          <!-- History Item 2 -->
          <div class="flex items-center justify-between px-6 py-5">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center text-slate-400">
                <i data-lucide="clock" class="w-5 h-5"></i>
              </div>
              <div>
                <p class="text-[13px] font-extrabold text-slate-800 dark:text-slate-200">Cuti Tahunan</p>
                <p class="text-[10px] text-slate-400 font-medium">20 - 21 Mei • 2 Hari</p>
              </div>
            </div>
            <span class="px-2.5 py-1 bg-amber-50 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 rounded-lg text-[9px] font-extrabold uppercase tracking-widest">Pending</span>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script type="module" src="../src/features/leave/leave.controller.js"></script>
</body>
</html>
