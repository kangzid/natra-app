<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NATRA - Inventaris Aset</title>
  <link rel="stylesheet" href="../src/styles/tailwind.css">
  <script src="../src/core/theme/theme-init.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 pb-12">
  <div class="app-wrap">
    
    <!-- Top Header -->
    <header class="module-header bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-gray-100 dark:border-slate-700 sticky top-0 z-[100]">
      <div class="module-header-row flex items-center gap-4 px-5 h-16">
        <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center text-slate-500 active:scale-90 transition-transform">
          <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
        <h1 class="text-lg font-bold text-slate-800 dark:text-white">Aset Perusahaan</h1>
        <div class="ml-auto">
          <button class="w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center text-slate-500">
            <i data-lucide="qr-code" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
    </header>

    <main class="px-5 py-6 space-y-8">
      
      <!-- Asset Summary Card -->
      <div class="bg-white dark:bg-slate-800 p-6 rounded-[2.5rem] border border-slate-100 dark:border-slate-700 shadow-sm flex items-center gap-5">
        <div class="w-14 h-14 bg-primary-50 dark:bg-primary-900/30 rounded-2xl flex items-center justify-center text-primary-600">
          <i data-lucide="info" class="w-7 h-7"></i>
        </div>
        <div>
          <p class="text-[13px] font-extrabold text-slate-800 dark:text-white">Gunakan Aset dengan Baik</p>
          <p class="text-[10px] text-slate-400 font-medium leading-relaxed">Anda bertanggung jawab penuh atas 3 perangkat yang dipinjamkan.</p>
        </div>
      </div>

      <!-- Inventory List -->
      <section class="space-y-4">
        <h3 class="px-5 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest">Barang yang Dipinjam</h3>
        <div class="ios-settings-group space-y-3 !bg-transparent !p-0">
          <!-- Laptop -->
          <div class="bg-white dark:bg-slate-800 rounded-[2rem] p-5 shadow-sm border border-slate-100 dark:border-slate-700 flex items-center justify-between">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 bg-slate-50 dark:bg-slate-700 rounded-2xl flex items-center justify-center text-slate-800 dark:text-slate-200">
                <i data-lucide="laptop" class="w-6 h-6"></i>
              </div>
              <div>
                <p class="text-sm font-extrabold text-slate-800 dark:text-slate-200">MacBook Pro 14"</p>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">SN: MBP-2024-X99</p>
              </div>
            </div>
            <button class="text-[10px] font-extrabold text-primary-600">DETAIL</button>
          </div>
          <!-- ID Card -->
          <div class="bg-white dark:bg-slate-800 rounded-[2rem] p-5 shadow-sm border border-slate-100 dark:border-slate-700 flex items-center justify-between">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 bg-slate-50 dark:bg-slate-700 rounded-2xl flex items-center justify-center text-slate-800 dark:text-slate-200">
                <i data-lucide="contact" class="w-6 h-6"></i>
              </div>
              <div>
                <p class="text-sm font-extrabold text-slate-800 dark:text-slate-200">Kartu Akses Kantor</p>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">SN: NAT-044123</p>
              </div>
            </div>
            <button class="text-[10px] font-extrabold text-primary-600">DETAIL</button>
          </div>
          <!-- Smartphone -->
          <div class="bg-white dark:bg-slate-800 rounded-[2rem] p-5 shadow-sm border border-slate-100 dark:border-slate-700 flex items-center justify-between">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 bg-slate-50 dark:bg-slate-700 rounded-2xl flex items-center justify-center text-slate-800 dark:text-slate-200">
                <i data-lucide="smartphone" class="w-6 h-6"></i>
              </div>
              <div>
                <p class="text-sm font-extrabold text-slate-800 dark:text-slate-200">Samsung Galaxy S23</p>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">SN: S23-882-P3</p>
              </div>
            </div>
            <button class="text-[10px] font-extrabold text-primary-600">DETAIL</button>
          </div>
        </div>
      </section>

      <!-- Action -->
       <div class="px-2 pt-4">
        <button class="w-full bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-slate-200 rounded-[1.5rem] py-5 font-extrabold text-sm active:scale-95 transition-all">
          Lapor Kerusakan Aset
        </button>
       </div>

    </main>
  </div>

  <script type="module" src="../src/features/assets/assets.controller.js"></script>
</body>
</html>
