<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NATRA - Pinjaman Karyawan</title>
  <link rel="stylesheet" href="../src/styles/tailwind.css">
  <script src="../src/core/theme/theme-init.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 pb-12">
  <div class="app-wrap">
    
    <!-- Top Header -->
    <header class="module-header bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-gray-100 dark:border-slate-700 sticky top-0 z-[100]">
      <div class="module-header-row flex items-center gap-4 px-5 h-16">
        <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center text-slate-500 active:scale-90 transition-transform">
          <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
        <h1 class="text-lg font-bold text-slate-800 dark:text-white">Pinjaman</h1>
        <div class="ml-auto">
          <button class="w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center text-slate-500">
            <i data-lucide="help-circle" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
    </header>

    <main class="px-5 py-6 space-y-8">
      
      <!-- Loan Summary -->
      <div class="bg-slate-900 dark:bg-slate-800 p-7 rounded-[2.5rem] shadow-xl relative overflow-hidden text-white">
        <div class="absolute bottom-0 right-0 w-40 h-40 bg-primary-600/20 rounded-full -mb-20 -mr-20 blur-3xl"></div>
        <div class="relative z-10">
          <p class="text-[10px] font-extrabold uppercase tracking-[0.2em] text-slate-400 mb-2">Sisa Pinjaman</p>
          <h2 class="text-4xl font-extrabold tracking-tighter">Rp 4.500.000</h2>
          
          <div class="mt-8 pt-6 border-t border-white/10 flex justify-between">
            <div>
              <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Tenor Sisa</p>
              <p class="text-sm font-extrabold text-white">9 Bulan</p>
            </div>
            <div class="text-right">
              <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Deduksi/Bulan</p>
              <p class="text-sm font-extrabold text-emerald-400">Rp 500.000</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Instalment Schedule -->
      <section class="space-y-4">
        <h3 class="px-5 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest">Jadwal Cicilan</h3>
        <div class="bg-white dark:bg-slate-800 rounded-[2.5rem] overflow-hidden shadow-sm border border-slate-100 dark:border-slate-700">
          <div class="flex items-center justify-between px-6 py-5 border-b border-slate-50 dark:border-slate-700/50">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full bg-emerald-50 dark:bg-emerald-900/30 flex items-center justify-center text-emerald-600">
                 <i data-lucide="check" class="w-5 h-5"></i>
              </div>
              <div>
                <p class="text-[13px] font-extrabold text-slate-800 dark:text-slate-200">Cicilan Ke-1</p>
                <p class="text-[10px] text-slate-400 font-medium">Lunas • 25 Mar 2024</p>
              </div>
            </div>
            <p class="text-[12px] font-extrabold text-slate-800 dark:text-slate-200">- Rp 500k</p>
          </div>
          <div class="flex items-center justify-between px-6 py-5">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full bg-amber-50 dark:bg-amber-900/30 flex items-center justify-center text-amber-600">
                 <i data-lucide="clock" class="w-5 h-5"></i>
              </div>
              <div>
                <p class="text-[13px] font-extrabold text-slate-800 dark:text-slate-200">Cicilan Ke-2</p>
                <p class="text-[10px] text-slate-400 font-medium">Mendatang • 25 Apr 2024</p>
              </div>
            </div>
            <p class="text-[12px] font-extrabold text-slate-800 dark:text-slate-200">- Rp 500k</p>
          </div>
        </div>
      </section>

      <!-- CTA -->
      <div class="px-2">
        <button class="w-full bg-slate-100 dark:bg-slate-700 text-slate-400 dark:text-slate-500 rounded-[1.5rem] py-5 font-extrabold text-sm cursor-not-allowed">
          Ajukan Pinjaman Baru
        </button>
        <p class="text-center text-[10px] text-slate-400 mt-3 px-6 italic">Anda masih memiliki cicilan aktif. Pelunasan diperlukan sebelum mengajukan pinjaman baru.</p>
      </div>

    </main>
  </div>

  <script type="module" src="../src/features/loans/loans.controller.js"></script>
</body>
</html>
