<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NATRA - Izin & Sakit</title>
  <link rel="stylesheet" href="../src/styles/tailwind.css">
  <script src="../src/core/theme/theme-init.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 pb-12">
  <div class="app-wrap">
    
    <!-- Top Header - Matching Style -->
    <header class="module-header bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-gray-100 dark:border-slate-700 sticky top-0 z-[100]">
      <div class="module-header-row flex items-center gap-4 px-5 h-16">
        <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center text-slate-500 active:scale-90 transition-transform">
          <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
        <h1 class="text-lg font-bold text-slate-800 dark:text-white">Izin & Sakit</h1>
        <div class="ml-auto">
          <button class="w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center text-slate-500">
            <i data-lucide="help-circle" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
    </header>

    <main class="px-5 py-6 space-y-8">
      
      <!-- Permission Grid Options -->
      <section class="space-y-4">
        <h3 class="px-5 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest">Kategori Izin</h3>
        <div class="grid grid-cols-2 gap-4">
          <div class="bg-white dark:bg-slate-800 p-5 rounded-[2.5rem] border-2 border-primary-500 shadow-sm flex flex-col items-center">
            <div class="w-12 h-12 bg-primary-50 dark:bg-primary-900/30 rounded-full flex items-center justify-center text-primary-600 mb-3">
              <i data-lucide="thermometer" class="w-6 h-6"></i>
            </div>
            <p class="text-[13px] font-extrabold text-slate-800 dark:text-white">Sakit</p>
          </div>
          <div class="bg-white dark:bg-slate-800 p-5 rounded-[2.5rem] border border-slate-100 dark:border-slate-700 shadow-sm flex flex-col items-center opacity-60">
            <div class="w-12 h-12 bg-slate-50 dark:bg-slate-700 rounded-full flex items-center justify-center text-slate-400 mb-3">
              <i data-lucide="user-minus" class="w-6 h-6"></i>
            </div>
            <p class="text-[13px] font-extrabold text-slate-800 dark:text-white">Keperluan</p>
          </div>
        </div>
      </section>

      <!-- Form Details -->
      <section class="space-y-4">
        <h3 class="px-5 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest">Detail Pengajuan</h3>
        <div class="bg-white dark:bg-slate-800 rounded-[2.5rem] p-6 shadow-sm border border-slate-100 dark:border-slate-700 space-y-5">
          
          <div class="space-y-2">
            <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Keterangan</label>
            <textarea rows="3" placeholder="Contoh: Demam dan flu (disertai surat dokter)" 
              class="w-full bg-slate-50 dark:bg-slate-700/50 border-none rounded-2xl px-4 py-3.5 text-sm font-bold text-slate-800 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary-500/20 resize-none"></textarea>
          </div>

          <div class="space-y-2">
            <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Tanggal</label>
            <div class="relative">
              <input type="date" class="w-full bg-slate-50 dark:bg-slate-700/50 border-none rounded-2xl px-4 py-3.5 text-sm font-bold text-slate-800 dark:text-white focus:ring-2 focus:ring-primary-500/20">
            </div>
          </div>

          <!-- Attachment Upload Simulation -->
          <div class="space-y-2">
            <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Lampiran (Opsional)</label>
            <div class="border-2 border-dashed border-slate-100 dark:border-slate-700 rounded-2xl p-6 flex flex-col items-center justify-center gap-2 bg-slate-50/50 dark:bg-slate-700/30">
              <div class="w-10 h-10 bg-white dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-400 shadow-sm">
                <i data-lucide="camera" class="w-5 h-5"></i>
              </div>
              <p class="text-xs font-bold text-slate-400">Unggah Foto Surat Keterangan</p>
            </div>
          </div>

          <button class="w-full bg-primary-600 hover:bg-primary-700 text-white rounded-[1.5rem] py-5 flex items-center justify-center gap-3 active:scale-95 transition-all shadow-lg shadow-primary-500/20 mt-4">
            <i data-lucide="send" class="w-5 h-5"></i>
            <span class="font-extrabold">Kirim Permohonan</span>
          </button>
        </div>
      </section>

      <!-- Recent History -->
      <section class="space-y-4">
        <h3 class="px-5 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest">Status Terakhir</h3>
        <div class="ios-settings-group">
          <div class="ios-settings-row">
            <div class="ios-settings-icon bg-red-50 text-red-500">
              <i data-lucide="thermometer" class="w-5 h-5"></i>
            </div>
            <div class="flex-1">
              <p class="text-sm font-extrabold text-slate-800 dark:text-slate-200">Izin Sakit</p>
              <p class="text-[10px] text-slate-400 font-medium italic">Menunggu Verifikasi HRD</p>
            </div>
            <div class="w-2 h-2 rounded-full bg-amber-400"></div>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script type="module" src="../src/features/permission/permission.controller.js"></script>
</body>
</html>
