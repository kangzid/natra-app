<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NATRA - Berita & Pengumuman</title>
  <link rel="stylesheet" href="../src/styles/tailwind.css">
  <script src="../src/core/theme/theme-init.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 pb-12">
  <div class="app-wrap">
    
    <!-- Top Header -->
    <header class="module-header bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-gray-100 dark:border-slate-700 sticky top-0 z-[100]">
      <div class="module-header-row flex items-center gap-4 px-5 h-16">
        <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center text-slate-500 active:scale-90 transition-transform">
          <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
        <h1 class="text-lg font-bold text-slate-800 dark:text-white">Pengumuman</h1>
        <div class="ml-auto">
          <button class="w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center text-slate-500">
            <i data-lucide="search" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
    </header>

    <main class="px-5 py-6 space-y-6">
      
      <!-- Featured News Card -->
      <div class="relative w-full h-56 rounded-[2.5rem] overflow-hidden shadow-lg group">
        <img src="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?q=80&w=600" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="Office event">
        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/40 to-transparent"></div>
        <div class="absolute bottom-0 left-0 p-6 space-y-2">
          <span class="px-2.5 py-1 bg-primary-600 text-white rounded-lg text-[9px] font-extrabold uppercase tracking-widest">Headline</span>
          <h2 class="text-lg font-extrabold text-white leading-tight">NATRA Expo 2026: Masa Depan HR Digital Dimulai Hari Ini</h2>
          <p class="text-[10px] text-slate-300 font-medium">Published: 2 Jam yang lalu</p>
        </div>
      </div>

      <!-- Feed List -->
      <section class="space-y-4">
        <h3 class="px-5 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest">Terbaru Untuk Anda</h3>
        
        <div class="space-y-4">
          <!-- Item 1 -->
          <div class="bg-white dark:bg-slate-800 rounded-[2rem] p-4 shadow-sm border border-slate-100 dark:border-slate-700 flex gap-4">
            <div class="w-24 h-24 rounded-2xl overflow-hidden flex-shrink-0">
               <img src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?q=80&w=200" class="w-full h-full object-cover" alt="Meeting">
            </div>
            <div class="flex flex-col justify-center gap-1">
              <p class="text-[10px] font-extrabold text-primary-600 uppercase tracking-wider">Internal</p>
              <h4 class="text-sm font-extrabold text-slate-800 dark:text-slate-200 leading-snug">Kebijakan Baru Keamanan Data Karyawan</h4>
              <p class="text-[10px] text-slate-400 font-medium">19 Apr • HR Department</p>
            </div>
          </div>

          <!-- Item 2 -->
          <div class="bg-white dark:bg-slate-800 rounded-[2rem] p-4 shadow-sm border border-slate-100 dark:border-slate-700 flex gap-4">
            <div class="w-24 h-24 rounded-2xl overflow-hidden flex-shrink-0">
               <img src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0?q=80&w=200" class="w-full h-full object-cover" alt="Workshop">
            </div>
            <div class="flex flex-col justify-center gap-1">
              <p class="text-[10px] font-extrabold text-primary-600 uppercase tracking-wider">Event</p>
              <h4 class="text-sm font-extrabold text-slate-800 dark:text-slate-200 leading-snug">Workshop: Optimalisasi Pelacakan Real-time</h4>
              <p class="text-[10px] text-slate-400 font-medium">18 Apr • Ops Team</p>
            </div>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script type="module" src="../src/features/news/news.controller.js"></script>
</body>
</html>
