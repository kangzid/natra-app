<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NATRA - Detail Tugas</title>
  <link rel="stylesheet" href="../src/styles/tailwind.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 relative pb-24">

  <div class="app-screen">
    
    <!-- Top Header -->
    <header class="bg-white border-b border-slate-100 px-4 py-4 flex items-center sticky top-0 z-40">
      <button id="back-btn" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-600 hover:bg-slate-100 transition-colors mr-3 active:scale-95">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
      </button>
      <h1 class="text-xl font-bold text-slate-800">Detail Tugas</h1>
    </header>

    <main class="flex-1 overflow-y-auto px-4 py-6">
      
      <div id="task-loading" class="space-y-4">
        <!-- Skeleton -->
        <div class="bg-white rounded-2xl p-5 animate-pulse border border-slate-100">
          <div class="flex gap-2 mb-4">
             <div class="h-6 w-20 bg-slate-200 rounded-full"></div>
             <div class="h-6 w-24 bg-slate-200 rounded-full"></div>
          </div>
          <div class="h-5 w-3/4 bg-slate-200 rounded mb-3"></div>
          <div class="h-4 w-full bg-slate-200 rounded mb-2"></div>
          <div class="h-4 w-5/6 bg-slate-200 rounded"></div>
        </div>
      </div>

      <div id="task-content" class="hidden fade-in space-y-6">
        
        <!-- Task Info Card -->
        <div class="card p-5 relative overflow-hidden">
          <div class="absolute top-0 right-0 w-24 h-24 bg-primary-50 rounded-bl-full -z-10 mix-blend-multiply"></div>
          
          <div class="flex flex-wrap gap-2 mb-4">
            <span id="task-priority"></span>
            <span id="task-status"></span>
          </div>

          <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight leading-tight mb-4" id="task-title">Memuat judul tugas...</h2>
          
          <div class="bg-slate-50 rounded-xl p-4 mb-4 border border-slate-100">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-1.5"><i data-lucide="align-left" class="w-3.5 h-3.5"></i> Deskripsi</h3>
            <p class="text-sm text-slate-600 leading-relaxed" id="task-description">Memuat deskripsi...</p>
          </div>

          <div class="flex items-center gap-3 bg-red-50 text-red-700 p-3 rounded-xl border border-red-100">
             <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-red-500 shadow-sm"><i data-lucide="clock" class="w-4 h-4"></i></div>
             <div>
               <p class="text-[10px] font-bold uppercase tracking-wider text-red-500/70 mb-0.5">Tenggat Waktu</p>
               <p class="text-sm font-bold" id="task-due">--/--/----</p>
             </div>
          </div>
        </div>

        <!-- Completion Notes (If any) -->
        <div id="completion-section" class="hidden card p-5 border-emerald-100 bg-emerald-50/30">
          <h3 class="text-xs font-bold text-emerald-600 uppercase tracking-widest mb-2 flex items-center gap-1.5"><i data-lucide="check-circle" class="w-3.5 h-3.5"></i> Catatan Selesai</h3>
          <p class="text-sm text-slate-700 italic" id="completion-notes"></p>
        </div>

        <!-- Action Area -->
        <div id="task-action" class="mt-8">
           <!-- Rendered by JS -->
        </div>

      </div>
    </main>
  </div>

  <script type="module" src="../src/features/tasks/task-detail.controller.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
