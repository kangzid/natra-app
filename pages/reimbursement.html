<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NATRA - Reimbursement</title>
  <link rel="stylesheet" href="../src/styles/tailwind.css">
  <script src="../src/core/theme/theme-init.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 pb-12">
  <div class="app-wrap">
    
    <!-- Top Header -->
    <header class="module-header bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-gray-100 dark:border-slate-700 sticky top-0 z-[100]">
      <div class="module-header-row flex items-center gap-4 px-5 h-16">
        <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center text-slate-500 active:scale-90 transition-transform">
          <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
        <h1 class="text-lg font-bold text-slate-800 dark:text-white">Reimbursement</h1>
        <div class="ml-auto">
          <button class="w-10 h-10 rounded-full bg-primary-50 dark:bg-primary-900/30 flex items-center justify-center text-primary-600">
            <i data-lucide="plus" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
    </header>

    <main class="px-5 py-6 space-y-8">
      
      <!-- Stats Overview -->
      <div class="grid grid-cols-2 gap-4">
        <div class="bg-blue-600 p-5 rounded-[2.5rem] shadow-lg shadow-blue-500/20 text-white relative overflow-hidden">
          <div class="absolute top-0 right-0 w-16 h-16 bg-white/10 rounded-full -mr-8 -mt-8"></div>
          <p class="text-[10px] font-extrabold uppercase tracking-widest text-blue-100 mb-1">Total Cair</p>
          <p class="text-[18px] font-extrabold">Rp 2.450k</p>
          <p class="text-[8px] font-medium text-blue-200 mt-2">Bulan ini</p>
        </div>
        <div class="bg-white dark:bg-slate-800 p-5 rounded-[2.5rem] border border-slate-100 dark:border-slate-700 shadow-sm flex flex-col">
          <p class="text-[10px] font-extrabold uppercase tracking-widest text-slate-400 mb-1">Pending</p>
          <p class="text-[18px] font-extrabold text-slate-800 dark:text-white">Rp 750k</p>
          <div class="flex items-center gap-1 mt-2">
            <div class="w-1.5 h-1.5 rounded-full bg-amber-400 animate-pulse"></div>
            <span class="text-[8px] font-bold text-slate-400">3 Pengajuan</span>
          </div>
        </div>
      </div>

      <!-- Submission Form -->
      <section class="space-y-4">
        <h3 class="px-5 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest">Klaim Baru</h3>
        <div class="bg-white dark:bg-slate-800 rounded-[2.5rem] p-6 shadow-sm border border-slate-100 dark:border-slate-700 space-y-4">
          <div class="space-y-2">
            <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Kategori</label>
            <div class="relative">
              <select class="w-full bg-slate-50 dark:bg-slate-700/50 border-none rounded-2xl px-4 py-3.5 text-sm font-bold text-slate-800 dark:text-white appearance-none">
                <option>Kesehatan (Medical)</option>
                <option>Transportasi / BBM</option>
                <option>Parkir & Tol</option>
                <option>Perlengkapan Kantor</option>
              </select>
              <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Nominal (Rp)</label>
            <input type="number" placeholder="Contoh: 150000" class="w-full bg-slate-50 dark:bg-slate-700/50 border-none rounded-2xl px-4 py-3.5 text-sm font-bold text-slate-800 dark:text-white">
          </div>

          <div class="space-y-2">
            <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Bukti Nota</label>
            <button class="w-full border-2 border-dashed border-slate-100 dark:border-slate-700 rounded-2xl p-6 flex flex-col items-center justify-center gap-2 bg-slate-50/50 dark:bg-slate-700/30">
              <div class="w-10 h-10 bg-white dark:bg-slate-800 rounded-full flex items-center justify-center text-primary-600 shadow-sm">
                <i data-lucide="camera" class="w-5 h-5"></i>
              </div>
              <p class="text-xs font-bold text-slate-400">Klik untuk Foto Nota</p>
            </button>
          </div>

          <button id="btn-submit-reimbursement" class="w-full bg-primary-600 hover:bg-primary-700 text-white rounded-[1.5rem] py-5 flex items-center justify-center gap-3 active:scale-95 transition-all shadow-lg shadow-primary-500/20 mt-2">
            <i data-lucide="send" class="w-5 h-5"></i>
            <span class="font-extrabold tracking-tight">Kirim Pengajuan</span>
          </button>
        </div>
      </section>

      <!-- History -->
      <section class="space-y-4">
        <h3 class="px-5 text-[11px] font-extrabold text-slate-400 uppercase tracking-widest">Riwayat Terakhir</h3>
        <div class="bg-white dark:bg-slate-800 rounded-[2.5rem] overflow-hidden shadow-sm border border-slate-100 dark:border-slate-700">
          <div class="flex items-center justify-between px-6 py-5 border-b border-slate-50 dark:border-slate-700/50">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full bg-emerald-50 dark:bg-emerald-900/30 flex items-center justify-center text-emerald-600">
                <i data-lucide="check" class="w-5 h-5"></i>
              </div>
              <div>
                <p class="text-[13px] font-extrabold text-slate-800 dark:text-slate-200">Klinik Sehat</p>
                <p class="text-[10px] text-slate-400 font-medium">12 Apr • Rp 450.000</p>
              </div>
            </div>
            <span class="text-[10px] font-extrabold text-emerald-600">PAID</span>
          </div>
          <div class="flex items-center justify-between px-6 py-5">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full bg-amber-50 dark:bg-amber-900/30 flex items-center justify-center text-amber-600">
                <i data-lucide="clock" class="w-5 h-5"></i>
              </div>
              <div>
                <p class="text-[13px] font-extrabold text-slate-800 dark:text-slate-200">BBM Pertamax</p>
                <p class="text-[10px] text-slate-400 font-medium">18 Apr • Rp 200.000</p>
              </div>
            </div>
            <span class="text-[10px] font-extrabold text-amber-500 text-right">IN REVIEW</span>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script type="module" src="../src/features/reimbursement/reimbursement.controller.js"></script>
</body>
</html>
